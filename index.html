<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Full-screen Video Background -->
    <video autoplay muted loop id="bg-video">
        <source src="your-video.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <h1>My Personal Dashboard</h1>
        <nav>
            <button onclick="playSound(); showSection('savings')">Savings</button>
            <button onclick="playSound(); showSection('anime')">Anime</button>
            <button onclick="playSound(); showSection('books')">Books</button>
        </nav>

        <div id="content-area">
            <!-- Sections will appear here -->
        </div>
    </div>

    <audio id="click-sound" src="click.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Persona Hub // Fullscreen Matrix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Space+Grotesk:wght@700&display=swap');
        
        /* 1. Fullscreen Background Layer */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        
        body { margin: 0; font-family: 'Space Grotesk', sans-serif; color: white; background: #000; }

        /* 2. Interface Layer */
        .hub-container { padding: 3rem; max-width: 1200px; margin: 0 auto; }
        header { border-left: 10px solid #ff0055; padding-left: 20px; margin-bottom: 3rem; }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 3rem; text-transform: uppercase; margin: 0; }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; }
        .card { background: rgba(0,0,0,0.8); border: 2px solid #fff; padding: 1.5rem; transition: 0.3s; }
        .card:hover { transform: scale(1.05); border-color: #00f2fe; }

        /* Sound Toggle */
        #sound-toggle { position: fixed; top: 20px; right: 20px; z-index: 10; cursor: pointer; background: #ff0055; padding: 10px; font-weight: 900; }
    </style>
</head>
<body>

    <!-- Fullscreen Media -->
    <video id="bg-video" autoplay loop muted playsinline></video>
    <div id="sound-toggle" onclick="toggleSound()">🔊 SOUND: OFF</div>

    <div class="hub-container">
        <header>
            <h1>System://Persona.Hub</h1>
        </header>

        <div class="card-grid">
            <div class="card" onclick="location.href='#vault'">💰 VAULT MATRIX</div>
            <div class="card" onclick="location.href='#calendar'">📅 CHRONO TRACKER</div>
            <div class="card" onclick="location.href='#anime'">📺 ANIME LOG</div>
            <div class="card" onclick="location.href='#library'">📚 ARCHIVE</div>
        </div>

        <!-- File Mapper at Bottom -->
        <div style="margin-top:5rem; background:rgba(0,0,0,0.9); padding:2rem; border:1px dashed #fff;">
            <h3>🛠️ ASSET INJECTOR</h3>
            <input type="file" id="vidInput" accept="video/*" onchange="loadBg(this)">
            <input type="file" id="sndInput" accept="audio/*" onchange="loadSnd(this)">
        </div>
    </div>

    <script>
        let bgVid = document.getElementById('bg-video');
        let audio = new Audio();

        // Load background video from PC
        function loadBg(input) {
            const file = input.files[0];
            const url = URL.createObjectURL(file);
            bgVid.src = url;
        }

        // Load sound from PC
        function loadSnd(input) {
            const file = input.files[0];
            audio.src = URL.createObjectURL(file);
            audio.loop = true;
        }

        function toggleSound() {
            if(audio.paused) {
                audio.play();
                document.getElementById('sound-toggle').innerText = "🔊 SOUND: ON";
            } else {
                audio.pause();
                document.getElementById('sound-toggle').innerText = "🔊 SOUND: OFF";
            }
        }
    </script>
</body>
</html>

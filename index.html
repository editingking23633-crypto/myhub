<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 2rem; }
        header { margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        h1 { color: var(--accent-blue); }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h2 { font-size: 1.25rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; color: var(--accent-blue); }
        input, button { background: #0f172a; border: 1px solid var(--border); color: white; padding: 0.5rem; border-radius: 6px; margin-bottom: 0.5rem; width: 100%; }
        button { background-color: var(--accent-blue); color: #0f172a; font-weight: bold; cursor: pointer; border: none; }
        button:hover { opacity: 0.9; }
        .list-item { display: flex; justify-content: space-between; background: #111827; padding: 0.75rem; border-radius: 6px; margin-bottom: 0.5rem; border-left: 4px solid var(--accent-blue); font-size: 0.9rem; }
        .progress-container { background: #0f172a; border-radius: 20px; height: 20px; width: 100%; overflow: hidden; margin: 1rem 0; border: 1px solid var(--border); }
        .progress-bar { background: var(--accent-green); height: 100%; width: 0%; transition: width 0.4s ease; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 0.8rem; }
        .cal-day-head { font-weight: bold; color: var(--text-muted); padding: 5px 0; }
        .cal-day { background: #0f172a; padding: 10px 0; border-radius: 4px; border: 1px solid var(--border); min-height: 40px; position: relative;}
        .has-event::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; background: var(--accent-blue); border-radius: 50%; }
    </style>
</head>
<body>
    <header>
        <h1>My Personal Hub</h1>
        <p style="color: var(--text-muted);">Standalone Workspace</p>
    </header>
    <div class="dashboard-grid">
        <div class="card">
            <h2>📅 Calendar</h2>
            <input type="text" id="eventTitle" placeholder="Event Description...">
            <input type="date" id="eventDate">
            <button onclick="addCalendarEvent()">Add Event</button>
            <div style="margin-top:1rem;" class="calendar-grid" id="calendarGrid"></div>
        </div>
        <div class="card">
            <h2>💰 Savings Tracker</h2>
            <div>Total Balance: <span id="totalSavings" style="color:var(--accent-green); font-weight:bold;">₹0</span></div>
            <div class="progress-container"><div class="progress-bar" id="savingsProgress"></div></div>
            <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:1rem;">Goal target: ₹50,000</p>
            <input type="number" id="savingsAmount" placeholder="Amount (e.g. 500 or -200)">
            <button onclick="updateSavings()">Log Transaction</button>
        </div>
        <div class="card">
            <h2>📺 Anime List</h2>
            <input type="text" id="animeTitle" placeholder="Anime Title...">
            <input type="text" id="animeEp" placeholder="Current Episode / Status">
            <button onclick="addAnime()">Log Anime</button>
            <div id="animeList" style="margin-top: 1rem; max-height: 200px; overflow-y: auto;"></div>
        </div>
        <div class="card">
            <h2>📚 Reading Library</h2>
            <input type="text" id="bookTitle" placeholder="Book Title...">
            <input type="text" id="bookAuthor" placeholder="Author name...">
            <button onclick="addBook()">Log Book</button>
            <div id="bookList" style="margin-top: 1rem; max-height: 200px; overflow-y: auto;"></div>
        </div>
    </div>
    <script>
        let state = JSON.parse(localStorage.getItem('hubState')) || { anime: [], books: [], savings: 0, events: {} };
        function saveState() { localStorage.setItem('hubState', JSON.stringify(state)); renderAll(); }
        function addAnime() {
            const title = document.getElementById('animeTitle').value; const ep = document.getElementById('animeEp').value;
            if(!title) return; state.anime.push({title, ep}); document.getElementById('animeTitle').value = ''; document.getElementById('animeEp').value = ''; saveState();
        }
        function addBook() {
            const title = document.getElementById('bookTitle').value; const author = document.getElementById('bookAuthor').value;
            if(!title) return; state.books.push({title, author}); document.getElementById('bookTitle').value = ''; document.getElementById('bookAuthor').value = ''; saveState();
        }
        function updateSavings() {
            const amount = parseFloat(document.getElementById('savingsAmount').value);
            if(isNaN(amount)) return; state.savings += amount; document.getElementById('savingsAmount').value = ''; saveState();
        }
        function addCalendarEvent() {
            const txt = document.getElementById('eventTitle').value; const date = document.getElementById('eventDate').value;
            if(!txt || !date) return; state.events[date] = txt; document.getElementById('eventTitle').value = ''; saveState();
        }
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = ''; const days = ['S','M','T','W','T','F','S'];
            days.forEach(d => grid.innerHTML += `<div class="cal-day-head">${d}</div>`);
            for(let i=1; i<=28; i++) {
                let dateStr = `2026-07-${i < 10 ? '0'+i : i}`;
                let hasEv = state.events[dateStr] ? 'has-event' : ''; let titleAttr = state.events[dateStr] ? `title="${state.events[dateStr]}"` : '';
                grid.innerHTML += `<div class="cal-day ${hasEv}" ${titleAttr}>${i}</div>`;
            }
        }
        function renderAll() {
            document.getElementById('animeList').innerHTML = state.anime.map(a => `<div class="list-item"><span><b>${a.title}</b></span><span style="color:var(--accent-blue)">${a.ep}</span></div>`).join('');
            document.getElementById('bookList').innerHTML = state.books.map(b => `<div class="list-item"><span><b>${b.title}</b></span><span style="color:var(--text-muted)">${b.author}</span></div>`).join('');
            document.getElementById('totalSavings').innerText = '₹' + state.savings.toLocaleString();
            let percent = Math.min((state.savings / 50000) * 100, 100); document.getElementById('savingsProgress').style.width = Math.max(percent, 0) + '%';
            renderCalendar();
        }
        renderAll();
    </script>
</body>
</html>

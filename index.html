<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        
        #bg-video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; }

        .menu-container { position: absolute; left: 50px; top: 100px; display: flex; flex-direction: column; gap: 30px; }
        .menu-btn { background: none; border: none; color: white; font-size: 60px; font-weight: 900; text-transform: uppercase; text-align: left; cursor: pointer; transition: 0.3s; text-shadow: 4px 4px 0px #ff003c; }
        .menu-btn:hover { color: #ff003c; transform: translateX(20px); text-shadow: 4px 4px 0px #fff; }

        #panel { position: absolute; right: 50px; top: 100px; width: 400px; background: rgba(0,0,0,0.85); border: 2px solid #ff003c; padding: 20px; }
        
        #video-upload-area { position: absolute; bottom: 20px; left: 50px; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #ff003c; }
    </style>
</head>
<body>

    <audio id="click-sound" src="click.mp3"></audio>

    <video autoplay muted loop id="bg-video"></video>

    <div id="video-upload-area">
        <label for="videoFile" style="cursor:pointer; color:#ff003c;">[ SELECT VIDEO FROM PC ]</label>
        <input type="file" id="videoFile" accept="video/*" style="display:none;">
    </div>

    <div class="menu-container">
        <button class="menu-btn" onclick="playSound(); updatePanel('savings')">Savings</button>
        <button class="menu-btn" onclick="playSound(); updatePanel('anime')">Anime</button>
        <button class="menu-btn" onclick="playSound(); updatePanel('books')">Books</button>
    </div>

    <div id="panel">
        </div>

    <script>
        // Audio Logic
        function playSound() {
            const audio = document.getElementById('click-sound');
            audio.currentTime = 0; // Reset to start so it plays repeatedly
            audio.play().catch(e => console.log("Audio play failed: ", e));
        }

        // Video Uploader
        const videoInput = document.getElementById('videoFile');
        const videoPlayer = document.getElementById('bg-video');

        videoInput.addEventListener('change', function() {
            const file = this.files[0];
            const url = URL.createObjectURL(file);
            videoPlayer.src = url;
        });

        // Panel Logic
        function updatePanel(type) {
            const panel = document.getElementById('panel');
            panel.innerHTML = `
                <h2 style="color: #ff003c;">${type.toUpperCase()}</h2>
                <input type="text" id="in" placeholder="Enter details..." style="width:80%; padding:10px;">
                <button onclick="addI()" style="background:#ff003c; color:white; border:none; padding:10px;">Add</button>
                <ul id="list"></ul>
            `;
        }

        function addI() { 
            let li = document.createElement('li');
            li.innerText = document.getElementById('in').value;
            document.getElementById('list').appendChild(li);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; color: white; background: #1a1a1a; }
        #bg-video { position: fixed; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; }
        .overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: rgba(0, 0, 0, 0.6); }
        button { background: rgba(255, 255, 255, 0.1); border: 2px solid white; color: white; padding: 20px 40px; margin: 15px; cursor: pointer; transition: 0.4s; border-radius: 15px; font-size: 20px; font-weight: bold; }
        button:hover { background: white; color: black; transform: scale(1.15); box-shadow: 0px 0px 20px white; }
        #display-area { margin-top: 30px; font-size: 24px; text-shadow: 2px 2px 5px black; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <h1>My Dashboard</h1>
        <nav>
            <button onclick="updateDisplay('💰 Savings Goal: $0')">Savings</button>
            <button onclick="updateDisplay('📺 Anime: Watching...')">Anime</button>
            <button onclick="updateDisplay('📚 Books: Reading...')">Books</button>
        </nav>
        <div id="display-area">Click a button to start</div>
    </div>

    <audio id="audio-click" src="click.mp3"></audio>

    <script>
        function updateDisplay(text) {
            const sound = document.getElementById("audio-click");
            sound.currentTime = 0;
            sound.play().catch(e => console.log("Click the page first to enable sound!"));
            document.getElementById("display-area").innerHTML = text;
        }
    </script>
</body>
</html>

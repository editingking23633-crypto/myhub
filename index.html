<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona Hub // Workspace</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

        :root {
            --bg-dark: #060911;
            --panel-bg: #0d1322;
            --neon-blue: #00f2fe;
            --neon-magenta: #ff0055;
            --neon-green: #39ff14;
            --text-main: #ffffff;
            --text-muted: #64748b;
        }

        /* Smooth crisp rendering rules */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            padding: 2rem; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden; 
        }
        
        header { 
            margin-bottom: 3rem; 
            border-bottom: 4px solid var(--text-main); 
            padding-bottom: 1rem;
            position: relative;
        }
        header h1 { 
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 2.5rem; 
            letter-spacing: -1px;
            text-transform: uppercase;
            color: var(--text-main);
            background: linear-gradient(135deg, #fff 60%, var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p { 
            color: var(--neon-blue); 
            font-size: 0.85rem; 
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0.25rem;
        }
        
        /* MENU SELECTION SYSTEM */
        .menu-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
            max-width: 550px;
            margin: 3rem auto;
        }
        
        .menu-btn {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-style: italic;
            background: #ffffff;
            color: #000000;
            padding: 1.25rem 2rem;
            font-size: 1.75rem;
            text-transform: uppercase;
            cursor: pointer;
            text-align: left;
            position: relative;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);
            transition: all 0.15s ease-out;
            border: none;
        }
        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: var(--neon-magenta);
            z-index: -1;
            transition: all 0.25s ease;
        }
        .menu-btn:hover {
            color: #ffffff;
            transform: scale(1.04) translateX(10px);
            background: var(--neon-magenta);
            box-shadow: -10px 10px 0px var(--neon-blue);
        }
        .menu-btn span {
            float: right;
            margin-right: 5%;
            color: var(--bg-dark);
        }
        .menu-btn:hover span { color: #fff; }

        /* INTERACTIVE VIEWS */
        .view-section {
            display: none;
            max-width: 650px;
            margin: 0 auto;
            background-color: var(--panel-bg); 
            border: 3px solid #ffffff; 
            padding: 2rem; 
            clip-path: polygon(0 0, 100% 0, 100% 96%, 4% 100%, 0% 100%);
            animation: sharpSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes sharpSlide {
            0% { transform: translateX(50px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .back-btn {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            background: var(--neon-blue);
            color: #000;
            padding: 0.5rem 1.2rem;
            margin-bottom: 2rem;
            display: inline-block;
            cursor: pointer;
            font-size: 0.85rem;
            text-transform: uppercase;
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0% 100%);
        }
        .back-btn:hover { background: #fff; }

        h2 { 
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 1.6rem; 
            margin-bottom: 1.5rem; 
            color: #ffffff; 
            text-transform: uppercase;
            border-bottom: 3px solid var(--neon-blue);
            padding-bottom: 0.5rem;
        }
        
        input { 
            background: #05080f; 
            border: 2px solid #1e293b; 
            color: #ffffff; 
            padding: 0.8rem; 
            margin-bottom: 0.8rem; 
            width: 100%; 
            outline: none;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 4px;
        }
        input:focus { border-color: var(--neon-blue); }
        
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .action-btn { 
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            background-color: var(--neon-blue); 
            color: #000; 
            cursor: pointer; 
            border: none;
            padding: 0.85rem;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            clip-path: polygon(0 0, 100% 0, 92% 100%, 0% 100%);
        }
        .action-btn:hover { background: var(--neon-green); }
        
        .list-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: #05080f; 
            padding: 0.9rem 1.2rem; 
            margin-bottom: 0.6rem; 
            border-left: 4px solid var(--neon-magenta); 
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .history-item {
            background: #05080f;
            padding: 0.6rem 1rem;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
            font-weight: 700;
        }
        
        .progress-container { background: #05080f; height: 16px; width: 100%; margin: 1.5rem 0; border: 2px solid #fff; }
        .progress-bar { background: var(--neon-green); height: 100%; width: 0%; transition: width 0.3s ease; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; font-size: 0.9rem; font-weight: 600; }
        .cal-day-head { font-family: 'Montserrat', sans-serif; font-weight: 900; color: var(--neon-magenta); padding: 5px 0; font-size: 1.1rem; }
        .cal-day { background: #05080f; padding: 12px 0; min-height: 44px; position: relative; border: 1px solid #1e293b; }
        .has-event::after { content: ''; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; background: var(--neon-blue); }
        
        .audio-settings {
            margin-top: 2rem;
            background: #05080f;
            padding: 1.25rem;
            border-top: 2px dashed #1e293b;
            font-size: 0.8rem;
        }
        .audio-settings label { color: var(--neon-blue); font-weight: 700; display: block; margin-top: 0.5rem; margin-bottom: 0.25rem; text-transform: uppercase;}
    </style>
</head>
<body>

    <header>
        <h1>System://Persona.Hub</h1>
        <p>Core Data Interface // Active Protocol</p>
    </header>

    <!-- MAIN MENU VIEW -->
    <div class="menu-container" id="mainMenu">
        <button class="menu-btn" onclick="switchView('vaultCard')">01 // Vault Matrix <span>💰</span></button>
        <button class="menu-btn" onclick="switchView('chronoCard')">02 // Chrono Tracker <span>📅</span></button>
        <button class="menu-btn" onclick="switchView('animeCard')">03 // Anime Log <span>📺</span></button>
        <button class="menu-btn" onclick="switchView('libraryCard')">04 // Archive Files <span>📚</span></button>
    </div>

    <!-- SAVINGS SCREEN -->
    <div class="view-section" id="vaultCard">
        <div class="back-btn" onclick="showMenu()">↩ Back to System</div>
        <h2>💰 Vault Matrix</h2>
        <div style="font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px;">NET VALUE: <span id="totalSavings" style="color:var(--neon-green);">₹0</span></div>
        <div class="progress-container"><div class="progress-bar" id="savingsProgress"></div></div>
        
        <div style="display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1.5rem;">
            <span style="font-size:0.9rem; color:var(--neon-blue); font-weight:700; text-transform:uppercase;">Target Goal: ₹</span>
            <input type="number" id="savingsGoal" value="50000" onchange="changeGoal()" style="margin:0; padding: 0.4rem; width: 130px;">
        </div>

        <input type="text" id="savingsLabel" placeholder="Transaction labels / source notes...">
        <input type="number" id="savingsAmount" placeholder="Numerical balance adjustments...">
        <div class="btn-group">
            <button class="action-btn" onclick="modifySavings('add')">➕ Deposit</button>
            <button class="action-btn" style="background: var(--neon-magenta); color: #fff;" onclick="modifySavings('sub')">➖ Expense</button>
        </div>
        
        <div style="margin-top: 2rem;">
            <h3 style="font-family: 'Montserrat', sans-serif; font-weight:900; font-style:italic; font-size: 1rem; color: var(--neon-blue); margin-bottom: 0.75rem; text-transform: uppercase;">Ledger History</h3>
            <div id="savingsHistory" style="max-height: 140px; overflow-y: auto;"></div>
        </div>

        <div class="audio-settings">
            <h4 style="font-family: 'Montserrat', sans-serif; font-weight:900; color:#fff; text-transform: uppercase;">🎵 Audio System Matrix</h4>
            <label>Deposit MP3 Link:</label>
            <input type="text" id="saveAudioURL" onchange="updateAudioLinks()" value="https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav">
            <label>Expense MP3 Link:</label>
            <input type="text" id="spendAudioURL" onchange="updateAudioLinks()" value="https://assets.mixkit.co/active_storage/sfx/923/923-84.wav">
        </div>
    </div>

    <!-- CALENDAR SCREEN -->
    <div class="view-section" id="chronoCard">
        <div class="back-btn" onclick="showMenu()">↩ Back to System</div>
        <h2>📅 Chrono Tracker</h2>
        <input type="text" id="eventTitle" placeholder="Operation designation...">
        <input type="date" id="eventDate">
        <button class="action-btn" style="width:100%" onclick="addCalendarEvent()">Commit Timeline</button>
        <div style="margin-top:2rem;" class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- ANIME SCREEN -->
    <div class="view-section" id="animeCard">
        <div class="back-btn" onclick="showMenu()">↩ Back to System</div>
        <h2>📺 Anime Log</h2>
        <input type="text" id="animeTitle" placeholder="Series designation title...">
        <input type="text" id="animeEp" placeholder="Node progress status (e.g., Ep 12 / Completed)">
        <button class="action-btn" style="width:100%" onclick="addAnime()">Inject Record</button>
        <div id="animeList" style="margin-top: 2rem; max-height: 240px; overflow-y: auto;"></div>
    </div>

    <!-- LIBRARY SCREEN -->
    <div class="view-section" id="libraryCard">
        <div class="back-btn" onclick="showMenu()">↩ Back to System</div>
        <h2>📚 Archive Files</h2>
        <input type="text" id="bookTitle" placeholder="Document literary title...">
        <input type="text" id="bookAuthor" placeholder="Creator / Author designation...">
        <button class="action-btn" style="width:100%" onclick="addBook()">File Archive</button>
        <div id="bookList" style="margin-top: 2rem; max-height: 240px; overflow-y: auto;"></div>
    </div>

    <script>
        function playCustomSound(url) {
            if(!url) return;
            const audio = new Audio(url);
            audio.volume = 0.3;
            audio.play().catch(e => console.log("Audio waiting for touch trigger."));
        }

        let state = JSON.parse(localStorage.getItem('hubState')) || { 
            anime: [], books: [], savings: 0, savingsGoal: 50000, history: [], events: {},
            saveSound: "https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav",
            spendSound: "https://assets.mixkit.co/active_storage/sfx/923/923-84.wav"
        };

        function switchView(cardId) {
            document.getElementById('mainMenu').style.display = 'none';
            document.querySelectorAll('.view-section').forEach(s => s.style.display = 'none');
            document.getElementById(cardId).style.display = 'block';
        }

        function showMenu() {
            document.querySelectorAll('.view-section').forEach(s => s.style.display = 'none');
            document.getElementById('mainMenu').style.display = 'grid';
        }

        function updateAudioLinks() {
            state.saveSound = document.getElementById('saveAudioURL').value;
            state.spendSound = document.getElementById('spendAudioURL').value;
            localStorage.setItem('hubState', JSON.stringify(state));
        }

        function changeGoal() {
            const val = parseFloat(document.getElementById('savingsGoal').value);
            if(!isNaN(val) && val > 0) { state.savingsGoal = val; saveState(); }
        }

        function modifySavings(action) {
            const amount = parseFloat(document.getElementById('savingsAmount').value);
            let label = document.getElementById('savingsLabel').value.trim();
            if(isNaN(amount) || amount <= 0) return;
            if(!label) label = action === 'add' ? 'Deposit' : 'Expense';
            
            if(action === 'add') { 
                state.savings += amount; 
                state.history.unshift({ type: 'add', text: `+ ₹${amount} // ${label}` });
                playCustomSound(state.saveSound);
            } 
            else if(action === 'sub') { 
                state.savings -= amount; 
                state.history.unshift({ type: 'sub', text: `- ₹${amount} // ${label}` });
                playCustomSound(state.spendSound);
            }
            document.getElementById('savingsAmount').value = '';
            document.getElementById('savingsLabel').value = '';
            saveState();
        }

        function addAnime() {
            const title = document.getElementById('animeTitle').value; const ep = document.getElementById('animeEp').value;
            if(!title) return; state.anime.push({title, ep}); document.getElementById('animeTitle').value = ''; document.getElementById('animeEp').value = ''; saveState();
        }
        function addBook() {
            const title = document.getElementById('bookTitle').value; const author = document.getElementById('bookAuthor').value;
            if(!title) return; state.books.push({title, author}); document.getElementById('bookTitle').value = ''; document.getElementById('bookAuthor').value = ''; saveState();
        }
        function addCalendarEvent() {
            const txt = document.getElementById('eventTitle').value; const date = document.getElementById('eventDate').value;
            if(!txt || !date) return; state.events[date] = txt; document.getElementById('eventTitle').value = ''; saveState();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = ''; const days = ['S','M','T','W','T','F','S'];
            days.forEach(d => grid.innerHTML += `<div class="cal-day-head">${d}</div>`);
            for(let i=1; i<=28; i++) {
                let dateStr = `2026-07-${i < 10 ? '0'+i : i}`;
                let hasEv = state.events[dateStr] ? 'has-event' : ''; let titleAttr = state.events[dateStr] ? `title="${state.events[dateStr]}"` : '';
                grid.innerHTML += `<div class="cal-day ${hasEv}" ${titleAttr}>${i}</div>`;
            }
        }

        function saveState() { localStorage.setItem('hubState', JSON.stringify(state)); renderAll(); }

        function renderAll() {
            document.getElementById('animeList').innerHTML = state.anime.map(a => `<div class="list-item"><span><b>${a.title}</b></span><span style="color:var(--neon-blue)">${a.ep}</span></div>`).join('');
            document.getElementById('bookList').innerHTML = state.books.map(b => `<div class="list-item"><span><b>${b.title}</b></span><span style="color:var(--text-muted)">${b.author}</span></div>`).join('');
            document.getElementById('totalSavings').innerText = '₹' + state.savings.toLocaleString();
            document.getElementById('savingsGoal').value = state.savingsGoal;
            document.getElementById('saveAudioURL').value = state.saveSound || "";
            document.getElementById('spendAudioURL').value = state.spendSound || "";
            
            let percent = Math.min((state.savings / state.savingsGoal) * 100, 100); 
            document.getElementById('savingsProgress').style.width = Math.max(percent, 0) + '%';
            document.getElementById('savingsHistory').innerHTML = state.history.map(h => `<div class="history-item"><span style="color:${h.type === 'add' ? 'var(--neon-green)' : 'var(--neon-magenta)'}">${h.text}</span></div>`).join('');
            renderCalendar();
        }
        renderAll();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* Force black background so it never looks white */
        body { 
            margin: 0; padding: 0; 
            background: #000; 
            color: white; 
            font-family: 'Arial Black', sans-serif; 
            overflow: hidden; 
        }

        #bg-video { 
            position: fixed; width: 100vw; height: 100vh; 
            object-fit: cover; z-index: -1; 
        }

        .menu-container { 
            position: absolute; left: 50px; top: 150px; 
            display: flex; flex-direction: column; 
        }

        .menu-btn { 
            background: none; border: none; color: white; 
            font-size: 80px; font-weight: 900; 
            text-transform: uppercase; text-align: left; 
            cursor: pointer; line-height: 0.7; 
            transition: 0.2s;
            text-shadow: 4px 4px 0px #ff003c;
        }

        .menu-btn:hover { 
            color: #ff003c; transform: translateX(30px); 
            text-shadow: 4px 4px 0px white; 
        }

        #panel { 
            position: absolute; right: 50px; top: 150px; 
            width: 400px; background: rgba(0,0,0,0.85); 
            border-left: 5px solid #ff003c; padding: 30px;
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="menu-container">
        <button class="menu-btn" onclick="updatePanel('savings')">Savings</button>
        <button class="menu-btn" onclick="updatePanel('anime')">Anime</button>
        <button class="menu-btn" onclick="updatePanel('books')">Books</button>
    </div>

    <div id="panel">
        <h2 style="color: #ff003c;">SYSTEM READY</h2>
    </div>

    <script>
        function updatePanel(type) {
            const panel = document.getElementById('panel');
            if(type === 'savings') {
                panel.innerHTML = `
                    <h2 style="color: #ff003c;">SAVINGS</h2>
                    <p>Goal: $<span id="goal">0</span></p>
                    <input type="number" id="gVal" placeholder="Set Goal">
                    <button onclick="setG()">Set</button>
                    <br><br>
                    <p>Balance: $<span id="bal">0</span></p>
                    <input type="number" id="bVal" placeholder="Amount">
                    <button onclick="addB()">Add</button>
                    <button onclick="subB()">Sub</button>
                `;
            } else {
                panel.innerHTML = `
                    <h2 style="color: #ff003c;">${type.toUpperCase()}</h2>
                    <input type="text" id="in" placeholder="Enter name...">
                    <button onclick="addI('${type}')">Add</button>
                    <ul id="list"></ul>
                `;
            }
        }

        function setG() { document.getElementById('goal').innerText = document.getElementById('gVal').value; }
        function addB() { document.getElementById('bal').innerText = parseInt(document.getElementById('bal').innerText) + parseInt(document.getElementById('bVal').value); }
        function subB() { document.getElementById('bal').innerText = parseInt(document.getElementById('bal').innerText) - parseInt(document.getElementById('bVal').value); }
        function addI(t) { 
            let li = document.createElement('li');
            li.innerText = document.getElementById('in').value;
            document.getElementById('list').appendChild(li);
        }
    </script>
</body>
</html>

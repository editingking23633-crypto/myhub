<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona Hub // Combat Deck</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,900;1,900&family=Space+Grotesk:wght@700&display=swap');

        :root {
            --bg-dark: #090b10;
            --panel-bg: #ff0055;
            --neon-cyan: #00f2fe;
            --neon-magenta: #ff0055;
            --neon-yellow: #fffb00;
            --deep-dark: #000000;
            --pure-white: #ffffff;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
        }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--pure-white); 
            padding: 2.5rem 1.5rem; 
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 80% 20%, #171226 0%, var(--bg-dark) 60%);
        }
        
        /* AGGRESSIVE PERSONA COMBAT HEADER */
        header { 
            margin-bottom: 3.5rem; 
            border-bottom: 12px solid var(--pure-white); 
            padding-bottom: 1rem;
            transform: rotate(-3deg) skewX(-10deg);
            background: var(--deep-dark);
            display: inline-block;
            padding: 0.75rem 3rem 0.75rem 1.5rem;
            box-shadow: 8px 8px 0px var(--neon-magenta);
        }
        header h1 { 
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 3.2rem; 
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -3px;
            color: var(--pure-white);
            text-shadow: 4px 4px 0px var(--neon-cyan);
        }
        header p { 
            color: var(--neon-yellow); 
            font-size: 0.9rem; 
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 0.25rem;
            text-shadow: 2px 2px 0px var(--deep-dark);
        }

        /* 2-COLUMN SPLIT COMBAT LAYOUT */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
            max-width: 1200px;
            margin: 0 auto;
            align-items: start;
        }

        @media (min-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1.1fr 0.9fr;
            }
        }
        
        /* THE PHANTOM MENU TRACKS */
        .menu-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
            transform: rotate(-2deg);
        }
        
        .menu-btn {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-style: italic;
            background: var(--deep-dark);
            color: var(--pure-white);
            padding: 1.25rem 2.5rem;
            font-size: 2.2rem;
            text-transform: uppercase;
            cursor: pointer;
            text-align: left;
            position: relative;
            border: 4px solid var(--pure-white);
            /* Wild angled cutout */
            clip-path: polygon(0% 0%, 95% 0%, 100% 100%, 5% 100%);
            box-shadow: -10px 10px 0px var(--neon-magenta);
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* Crazy combat selection hover shifts */
        .menu-btn:hover {
            color: var(--deep-dark);
            background-color: var(--neon-yellow);
            transform: scale(1.06) translateX(20px) rotate(2deg);
            box-shadow: -15px 15px 0px var(--neon-cyan);
            border-color: var(--deep-dark);
        }
        
        .menu-btn span {
            float: right;
            color: var(--neon-cyan);
            font-size: 2.4rem;
            transition: transform 0.2s;
        }
        .menu-btn:hover span { 
            color: var(--deep-dark);
            transform: scale(1.2) rotate(-10deg);
        }

        /* PERMANENT COMBAT TERMINAL PANEL */
        .live-monitor-panel {
            background-color: var(--deep-dark);
            border: 6px solid var(--pure-white);
            padding: 1.75rem;
            clip-path: polygon(3% 0%, 100% 0%, 97% 100%, 0% 100%);
            box-shadow: 12px 12px 0px var(--neon-magenta);
            transform: rotate(1deg);
        }

        .live-monitor-panel h3 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 1.5rem;
            text-transform: uppercase;
            color: var(--neon-cyan);
            margin-bottom: 1rem;
            text-shadow: 3px 3px 0px var(--neon-magenta);
            border-bottom: 4px solid var(--pure-white);
            padding-bottom: 0.5rem;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
            border: 4px solid var(--pure-white);
            margin-bottom: 1.25rem;
            transform: skewX(-3deg);
            box-shadow: -6px 6px 0px var(--neon-magenta);
        }
        .video-wrapper iframe, .video-wrapper video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* LIGHTBOX POPUP PANELS (BATTLE MODES) */
        .view-section {
            display: none;
            max-width: 700px;
            margin: 0 auto;
            background-color: var(--deep-dark); 
            border: 6px solid var(--pure-white); 
            padding: 2.5rem; 
            clip-path: polygon(0% 2%, 98% 0%, 100% 96%, 2% 100%);
            box-shadow: -16px 16px 0px var(--neon-magenta), -16px 16px 0px 4px var(--neon-cyan);
            animation: combatFlash 0.2s ease-out forwards;
        }
        
        @keyframes combatFlash {
            0% { transform: scale(0.9) rotate(-5deg); opacity: 0; background: var(--pure-white); }
            50% { background: var(--neon-magenta); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; background: var(--deep-dark); }
        }

        .back-btn {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-style: italic;
            background: var(--neon-cyan);
            color: var(--text-dark);
            padding: 0.75rem 1.75rem;
            margin-bottom: 2rem;
            display: inline-block;
            cursor: pointer;
            font-size: 1.1rem;
            text-transform: uppercase;

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Persona Hub // Tactical Command Matrix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,900;1,900&family=Space+Grotesk:wght@700&display=swap');
        :root { --bg-dark: #090b10; --neon-cyan: #00f2fe; --neon-magenta: #ff0055; --neon-yellow: #fffb00; --pure-white: #ffffff; --deep-dark: #000000; }
        body { background-color: var(--bg-dark); color: var(--pure-white); font-family: 'Space Grotesk', sans-serif; padding: 2rem; overflow-x: hidden; }
        
        /* Terminal Aesthetics */
        header { border-bottom: 8px solid var(--pure-white); padding-bottom: 1rem; margin-bottom: 2rem; transform: skewX(-10deg); display: inline-block; }
        header h1 { font-family: 'Montserrat', sans-serif; font-style: italic; font-size: 2.5rem; text-transform: uppercase; color: var(--pure-white); text-shadow: 3px 3px 0px var(--neon-cyan); }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; max-width: 1000px; margin: 0 auto; }
        .menu-btn { font-family: 'Montserrat', sans-serif; font-weight: 900; font-style: italic; background: var(--deep-dark); color: var(--pure-white); padding: 1.5rem; border: 3px solid var(--pure-white); cursor: pointer; text-transform: uppercase; margin-bottom: 1rem; box-shadow: -8px 8px 0px var(--neon-magenta); transition: 0.2s; width: 100%; }
        .menu-btn:hover { background: var(--neon-yellow); color: var(--deep-dark); transform: translate(5px, -5px); }

        .view-section { display: none; background: var(--deep-dark); border: 4px solid var(--pure-white); padding: 2rem; box-shadow: -12px 12px 0px var(--neon-magenta); max-width: 800px; margin: 0 auto; }
        .back-btn { background: var(--neon-cyan); color: #000; font-weight: 900; padding: 0.5rem 1rem; cursor: pointer; display: inline-block; margin-bottom: 1rem; text-transform: uppercase; }
        
        .video-container { border: 4px solid var(--pure-white); background: #000; height: 300px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .config-matrix-panel { margin-top: 4rem; border: 2px dashed var(--neon-yellow); padding: 2rem; background: #000; max-width: 800px; margin-left: auto; margin-right: auto; }
        input, select { background: #111; color: #fff; border: 2px solid #333; padding: 0.8rem; width: 100%; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <header><h1>System://Persona.Command</h1></header>

    <div class="dashboard-grid" id="mainDashboardView">
        <div class="menu-container">
            <button class="menu-btn" onclick="switchView('main', 'main')">💥 MAIN MENU</button>
            <button class="menu-btn" onclick="switchView('vaultCard', 'vault')">💰 VAULT MATRIX</button>
            <button class="menu-btn" onclick="switchView('chronoCard', 'chrono')">📅 CHRONO TRACKER</button>
        </div>
        <div id="mediaDisplayArea" class="video-container">
            [ TERMINAL STANDBY ]
        </div>
    </div>

    <!-- UI Panels -->
    <div class="view-section" id="vaultCard">
        <div class="back-btn" onclick="showMenu()">↩ ESCAPE</div>
        <h2>VAULT MATRIX</h2>
    </div>

    <div class="view-section" id="chronoCard">
        <div class="back-btn" onclick="showMenu()">↩ ESCAPE</div>
        <h2>CHRONO TRACKER</h2>
    </div>

    <!-- Mapping Panel -->
    <div class="config-matrix-panel">
        <h3 style="color:var(--neon-yellow);">🛠️ ASSET MAPPING MATRIX</h3>
        <select id="targetSlot"><option value="main">Main Menu</option><option value="vault">Vault Matrix</option><option value="chrono">Chrono Tracker</option></select>
        <select id="assetSlot"><option value="video">Video</option><option value="sound">Sound</option></select>
        <input type="file" id="fileInput" accept="audio/*,video/*" onchange="mapFile()">
    </div>

    <script>
        let registry = JSON.parse(localStorage.getItem('registry')) || {};

        function mapFile() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                registry[document.getElementById('targetSlot').value + "_" + document.getElementById('assetSlot').value] = e.target.result;
                localStorage.setItem('registry', JSON.stringify(registry));
                alert("Asset Mounted to Registry.");
            };
            reader.readAsDataURL(file);
        }

        function switchView(id, registryKey) {
            // Hide Dashboard, Show Panel
            if(id !== 'main') {
                document.getElementById('mainDashboardView').style.display = 'none';
                document.getElementById(id).style.display = 'block';
            }
            
            // Play Mapped Media
            const videoData = registry[registryKey + "_video"];
            const soundData = registry[registryKey + "_sound"];
            
            if(videoData) {
                document.getElementById('mediaDisplayArea').innerHTML = `<video src="${videoData}" autoplay loop muted style="width:100%"></video>`;
            }
            if(soundData) {
                new Audio(soundData).play();
            }
        }

        function showMenu() {
            document.querySelectorAll('.view-section').forEach(s => s.style.display = 'none');
            document.getElementById('mainDashboardView').style.display = 'grid';
            // Reset Main Menu Media
            const mainVid = registry["main_video"];
            if(mainVid) document.getElementById('mediaDisplayArea').innerHTML = `<video src="${mainVid}" autoplay loop muted style="width:100%"></video>`;
        }
    </script>
</body>
</html>
